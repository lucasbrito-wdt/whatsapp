name: whatsapp-unofficial
base: core22
version: "1.0.0"
title: WhatsApp (Unofficial)
summary: WhatsApp Desktop for Linux
description: |
  Cliente WhatsApp para Linux construído com Tauri v2.
  Suporte completo a áudio (chamadas, mensagens de voz) via PipeWire,
  system tray, notificações de desktop e sessão persistente.
  Carrega o WhatsApp Web oficial sem API não autorizada.
license: MIT
contact: https://github.com/lucasbrito-wdt/whatsapp-unofficial/issues
website: https://github.com/lucasbrito-wdt/whatsapp-unofficial

grade: stable
confinement: strict

architectures:
  - build-on: [amd64]
    build-for: [amd64]

layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1

apps:
  whatsapp-unofficial:
    command: usr/bin/app
    desktop: usr/share/applications/WhatsApp.desktop
    environment:
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib:$LD_LIBRARY_PATH
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - network
      - network-bind
      - audio-playback
      - audio-record
      - camera
      - home
      - pulseaudio
      - browser-support
      - gsettings

parts:
  whatsapp-unofficial:
    plugin: dump
    source: src-tauri/target/release/bundle/deb/WhatsApp_1.0.0_amd64.deb
    source-type: deb
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libjavascriptcoregtk-4.1-0
      - libayatana-appindicator3-1
      - gstreamer1.0-pipewire
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - libgstreamer1.0-0
      - libgstreamer-gl1.0-0
      - libgtk-3-0
      - libgdk-pixbuf-2.0-0
      - libsoup-3.0-0
      - libsecret-1-0
      - libenchant-2-2
      - libhyphen0
      - liblcms2-2
      - libwoff1
      - libicu74
      - libmanette-0.2-0
      - libunwind8
      - libgudev-1.0-0
      - libnghttp2-14
      - libatomic1
      - libegl1
      - libgl1
      - libepoxy0
      - libevdev2
      - libgbm1
      - libpsl5t64
      - libxkbcommon0
      - libxcomposite1
      - libxcursor1
      - libxdamage1
      - libxfixes3
      - libxi6
      - libxinerama1
      - libxrandr2
      - libxrender1
      - libxcb1
      - libxcb-render0
      - libxcb-shm0
      - libwebp7
      - libxml2
      - libxslt1.1
