name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-pipewire \
            libgstreamer-plugins-base1.0-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload .deb
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          name: "WhatsApp Linux v${{ steps.version.outputs.VERSION }}"
          body: |
            ## WhatsApp Desktop for Linux v${{ steps.version.outputs.VERSION }}

            ### Instalação

            **Ubuntu / Debian (.deb):**
            ```bash
            sudo dpkg -i whatsapp-tauri_${{ steps.version.outputs.VERSION }}_amd64.deb
            ```

            **Qualquer distro (AppImage):**
            ```bash
            chmod +x whatsapp-tauri_${{ steps.version.outputs.VERSION }}_amd64.AppImage
            ./whatsapp-tauri_${{ steps.version.outputs.VERSION }}_amd64.AppImage
            ```

            ### Requisitos
            - libwebkit2gtk-4.1-0
            - gstreamer1.0-pipewire (para áudio em chamadas)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
